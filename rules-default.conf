# Built-in default smart-routing rules.
#
# These are ALWAYS merged ahead of (higher priority than) your imported rules,
# and survive reinstalls / re-imports. Categories defined here show up in the
# Telegram bot's 分类→出口映射, so you can point each at any exit (or direct).
#
# Format is the same rule-list syntax as the imported rules:
#   DOMAIN-SUFFIX,example.com,Category
#   RULE-SET,https://.../list.yaml,Category
#
# Speedtest endpoints — kept separate so the测速 can be sent through a chosen
# exit (or direct) independently of everything else.
RULE-SET,https://clashios.app/static/rules/speedtest-domain-set.yaml,Speedtest
